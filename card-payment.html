<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement par carte</title>
    <link rel="stylesheet" href="css/Styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="brand-link">
            <div class="brand">
                <img src="Logo.png" alt="Logo Jéa Accessoires" class="logo">
                <h1>Jéa Accessoires</h1>
            </div>
        </a>
    </header>

    <main class="about-section">
        <h2>Paiement par carte</h2>
        <p>Merci d'avoir choisi le paiement par carte. Veuillez vérifier les informations de votre commande ci-dessous.</p>

        <div id="order-summary" class="payment-summary"></div>

        <form id="payment-form" class="payment-form" novalidate>
            <div class="checkout-group">
                <label for="payment-phone">Téléphone mobile</label>
                <input id="payment-phone" type="tel" inputmode="tel" placeholder="+212600000000" required pattern="^\+?[0-9]{9,15}$" title="Entrez un numéro de téléphone mobile valide avec uniquement des chiffres et un + facultatif">
            </div>
            <div class="checkout-group">
                <label for="payment-email">E-mail</label>
                <input id="payment-email" type="email" placeholder="exemple@domaine.com" required>
            </div>
            <div id="payment-error" class="payment-error" aria-live="polite"></div>
            <button id="confirm-payment-button" class="confirm-order-button" type="button">Confirmer paiement</button>
        </form>

        <div class="checkout-group">
            <a class="confirm-order-button" href="index.html">Retour à l'accueil</a>
        </div>
    </main>

    <script>
        const orderData = JSON.parse(sessionStorage.getItem('cardPaymentOrder') || 'null');
        const summary = document.getElementById('order-summary');
        const paymentPhone = document.getElementById('payment-phone');
        const paymentEmail = document.getElementById('payment-email');
        const paymentError = document.getElementById('payment-error');
        const confirmPaymentButton = document.getElementById('confirm-payment-button');

        if (!orderData) {
            summary.innerHTML = '<p>Aucune commande en attente. Retournez au panier pour refaire votre commande.</p>';
            document.getElementById('payment-form').style.display = 'none';
        } else {
            const itemsHtml = orderData.items.map(item => `<li>${item.product} — €${item.price.toFixed(2)}</li>`).join('');
            summary.innerHTML = `
                <div class="checkout-group">
                    <p><strong>Nom :</strong> ${orderData.name}</p>
                    <p><strong>Téléphone :</strong> ${orderData.phone}</p>
                    <p><strong>Adresse :</strong> ${orderData.address}</p>
                    <p><strong>Mode de paiement :</strong> Carte</p>
                </div>
                <div class="checkout-group">
                    <p><strong>Articles :</strong></p>
                    <ul style="padding-left: 20px; color: #7a5b5e;">${itemsHtml}</ul>
                    <p><strong>Total :</strong> €${orderData.total.toFixed(2)}</p>
                </div>
                <p>Veuillez suivre les instructions de votre terminal de paiement.</p>
            `;

            if (paymentPhone) {
                paymentPhone.value = orderData.phone || '';
            }

            confirmPaymentButton.addEventListener('click', () => {
                paymentError.textContent = '';
                paymentError.style.color = '#d00000';

                if (!paymentPhone.checkValidity()) {
                    paymentError.textContent = 'Téléphone invalide : entrez un numéro mobile correct, uniquement chiffres et un + facultatif.';
                    paymentPhone.reportValidity();
                    return;
                }
                if (!paymentEmail.checkValidity()) {
                    paymentError.textContent = 'E-mail invalide : entrez une adresse e-mail valide avec @.';
                    paymentEmail.reportValidity();
                    return;
                }

                const emailValue = paymentEmail.value.trim();
                summary.innerHTML += `
                    <div class="checkout-group">
                        <p><strong>Email :</strong> ${emailValue}</p>
                    </div>
                `;

                paymentError.textContent = 'Paiement confirmé. Merci !';
                paymentError.style.color = '#008000';
            });
        }
    </script>
</body>
</html>
